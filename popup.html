<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
    }
    
    h1 {
      font-size: 20px;
      margin: 0 0 10px 0;
      text-align: center;
    }
    
    .status {
      background: rgba(255, 255, 255, 0.2);
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 12px;
      font-size: 13px;
    }
    
    .info {
      font-size: 12px;
      line-height: 1.5;
      opacity: 0.9;
    }
    
    .warning {
      background: rgba(255, 255, 255, 0.15);
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 11px;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <h1>♟️ Chess Analyzer</h1>
  
  <div class="status" id="status">
    Real-time analysis active
  </div>
  
  <div class="info">
    <p><strong>Status:</strong> Monitoring chess.com</p>
    <p>The analyzer will automatically show best moves when it's your turn.</p>
  </div>
  
  <div class="warning">
    ⚠️ <strong>Warning:</strong> This is for educational purposes only. Using engines during rated games violates Terms of Service.
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
