<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #0f0f14;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .header-icon {
      font-size: 22px;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }

    .status-dot.active   { background: #4caf50; box-shadow: 0 0 6px rgba(76,175,80,0.5); }
    .status-dot.inactive { background: #ff9800; }

    .tip {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      line-height: 1.6;
      padding: 0 2px;
      margin-bottom: 12px;
    }

    .tip strong {
      color: rgba(255,255,255,0.5);
      font-weight: 600;
    }

    .warning {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      line-height: 1.5;
      padding: 9px 11px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">♟</div>
    <div class="header-text">
      <h1>Chess Analyzer</h1>
      <p>Stockfish · chess.com</p>
    </div>
  </div>

  <div class="status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Checking...</span>
  </div>

  <div class="tip">
    Select <strong>White</strong> or <strong>Black</strong> on the overlay to start.<br>
    Press <strong>H</strong> to quickly hide the panel.
  </div>

  <div class="warning">
    ⚠ For educational use only. Using engine assistance in rated games violates chess.com's Terms of Service.
  </div>

  <script src="popup.js"></script>
</body>
</html>
